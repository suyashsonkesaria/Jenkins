apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      name: nginx-pod
      labels:
        app: nginx
    spec:
      containers:
        - name: nginx
          image: nginx

---
apiVersion: v1
kind: Pod 
metadata:
  name: nginx-pod-configmap
  labels:
    app: nginx
    type: configmap
spec:
  containers:
    - name: nginx-container
      image: nginx
      
